server:
  port: 8080

spring:
  application:
    name: invoice-saas

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: validate          # Flyway manages schema, Hibernate only validates
    show-sql: false
    open-in-view: false           # Prevent lazy-loading surprises in controllers
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration

  # Mail (Brevo SMTP — configured via env vars in prod)
  mail:
    host: ${MAIL_HOST:smtp-relay.brevo.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # OAuth2 (Google SSO — Phase 3, client-id/secret from env vars)
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder}
            scope: openid, profile, email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

# Springdoc / Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# Custom app properties
app:
  jwt:
    secret: ${JWT_SECRET:super-secret-dev-key-change-in-production-must-be-at-least-256-bits-long!!}
    access-token-expiration-ms: 900000        # 15 minutes
    refresh-token-expiration-ms: 604800000    # 7 days
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200}

---
# ==================== DEV profile ====================
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/invoice_saas
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true

logging:
  level:
    com.smarttools.invoice: DEBUG
    org.springframework.security: DEBUG

---
# ==================== PROD profile ====================
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME:}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: org.postgresql.Driver

logging:
  level:
    com.smarttools.invoice: INFO
    org.springframework.security: WARN

---
# ==================== LOCAL profile (H2, no Docker needed) ====================
spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:h2:mem:invoice_saas;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    locations: classpath:db/migration-h2

  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    com.smarttools.invoice: DEBUG
    org.springframework.security: DEBUG
