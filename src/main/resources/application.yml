server:
  port: 8080

spring:
  application:
    name: invoice-saas

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 650MB

  # Database — Supabase PostgreSQL (Session Pooler — works even if port 5432 direct is blocked)
  # Set DB_URL, DB_USERNAME, DB_PASSWORD via environment variables or application-local.yml (gitignored)
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 5

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Mail (Brevo SMTP)
  mail:
    host: smtp-relay.brevo.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # OAuth2 (Google SSO) — disabled for now, re-enable in Phase 3 when Google credentials are ready
  # security:
  #   oauth2:
  #     client:
  #       registration:
  #         google:
  #           client-id: ${GOOGLE_CLIENT_ID}
  #           client-secret: ${GOOGLE_CLIENT_SECRET}
  #           scope: openid, profile, email
  #           redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

# Springdoc / Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# JWT & CORS
app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-ms: 900000        # 15 minutes
    refresh-token-expiration-ms: 604800000    # 7 days
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000,https://smart-tools-psi.vercel.app}

# Logging
logging:
  level:
    com.smarttools.invoice: DEBUG
    org.springframework.security: DEBUG
